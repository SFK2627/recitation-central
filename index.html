<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#111827">
  <title>JR Recitation App</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f6f9;
      color: #1f2937;
      text-align: center;
    }

    .app {
      max-width: 760px;
      min-height: 100vh;
      margin: 0 auto;
      background: white;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: #1f6feb;
      color: white;
      padding: 12px 14px 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.14);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 20px;
      line-height: 1.2;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .tab-button {
      min-height: 40px;
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.16);
      color: white;
      font-weight: bold;
      font-size: 15px;
    }

    .tab-button.active {
      background: white;
      color: #1f4e96;
      border-color: white;
    }

    .content {
      padding: 16px;
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    input,
    select,
    button {
      width: 100%;
      box-sizing: border-box;
      font-size: 16px;
      border-radius: 6px;
    }

    input,
    select {
      min-height: 46px;
      padding: 10px 11px;
      border: 1px solid #cbd5e1;
      margin-bottom: 10px;
      background: white;
    }

    button {
      min-height: 46px;
      padding: 11px;
      border: 0;
      background: #1f6feb;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button.secondary {
      background: #e2e8f0;
      color: #1f2937;
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .panel {
      border-top: 1px solid #e5e7eb;
      padding-top: 14px;
      margin-top: 14px;
    }

    .panel:first-child {
      border-top: 0;
      margin-top: 0;
      padding-top: 0;
    }

    .panel-title {
      margin: 0 0 10px;
      color: #334155;
      font-size: 15px;
      font-weight: bold;
      text-align: left;
    }

    .manual-row,
    .filter-row,
    .actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .manual-row button,
    .filter-row button {
      width: 130px;
    }

    .actions {
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .quick-points {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin: 0 0 10px;
    }

    .quick-points button {
      margin-top: 0;
      padding: 10px 6px;
      min-height: 42px;
      background: #eef4ff;
      color: #1f4e96;
      border: 1px solid #b8cdf5;
    }

    .quick-points button.active {
      background: #1f6feb;
      color: white;
      border-color: #1f6feb;
    }

    #reader {
      width: 100%;
      border-radius: 8px;
      overflow: hidden;
      margin-top: 15px;
    }

    #startButton {
      margin-top: 10px;
    }

    .result {
      display: none;
      margin-top: 12px;
      padding: 12px;
      border-radius: 6px;
      font-weight: bold;
      text-align: center;
      white-space: pre-line;
    }

    .success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .loading,
    .scanning {
      background: #e2e3e5;
      color: #383d41;
      border: 1px solid #d6d8db;
    }

    .queued {
      background: #fff3cd;
      color: #664d03;
      border: 1px solid #ffecb5;
    }

    .recent-panel {
      margin-top: 16px;
      text-align: left;
      border-top: 1px solid #e5e7eb;
      padding-top: 12px;
      display: none;
    }

    .recent-panel h3 {
      margin: 0 0 8px;
      color: #2c3e50;
      font-size: 15px;
    }

    .recent-list,
    .student-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
      padding-bottom: 20px;
    }

    .recent-item,
    .student-card {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 7px;
      padding: 10px 12px;
      color: #334155;
      font-size: 14px;
      line-height: 1.35;
      white-space: pre-line;
      text-align: left;
    }

    .student-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      cursor: pointer;
    }

    .student-card:active {
      background: #eef4ff;
    }

    .student-name {
      font-weight: bold;
      color: #1f2937;
      line-height: 1.3;
    }

    .student-meta {
      color: #64748b;
      font-size: 13px;
      margin-top: 4px;
      line-height: 1.35;
    }

    .points {
      font-weight: bold;
      color: #155724;
      white-space: nowrap;
      text-align: right;
    }

    .empty {
      text-align: center;
      color: #64748b;
      padding: 18px 8px;
    }

    @media (max-width: 560px) {
      .manual-row,
      .filter-row,
      .actions {
        grid-template-columns: 1fr;
      }

      .manual-row button,
      .filter-row button {
        width: 100%;
      }

      .student-card {
        grid-template-columns: 1fr;
      }

      .points {
        text-align: left;
      }
    }

    @media (max-width: 720px) {
      .manual-row {
        grid-template-columns: 1fr;
      }

      .manual-row button {
        width: 100%;
      }
    }

    :root {
      --yellow: #ffd43b;
      --yellow-soft: #fff3bf;
      --gold: #f59e0b;
      --black: #111827;
      --ink: #0f172a;
      --muted: #64748b;
      --line: rgba(15, 23, 42, 0.10);
      --card: rgba(255, 255, 255, 0.94);
      --green: #16a34a;
      --red: #dc2626;
      --shadow: 0 18px 46px rgba(15, 23, 42, 0.13);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255, 212, 59, 0.46), transparent 34%),
        radial-gradient(circle at 85% 12%, rgba(245, 158, 11, 0.22), transparent 28%),
        linear-gradient(135deg, #fff7d6 0%, #f8fafc 45%, #ffffff 100%);
      text-align: left;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(17, 24, 39, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(17, 24, 39, 0.035) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.55), transparent 76%);
    }

    .app {
      position: relative;
      width: min(940px, 100%);
      max-width: none;
      margin: 0 auto;
      padding: 12px;
      background: transparent;
    }

    .topbar {
      position: relative;
      z-index: 20;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 8px;
      padding: 10px 12px 12px;
      background: linear-gradient(135deg, #111827 0%, #1f2937 52%, #0f172a 100%);
      color: white;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.12);
    }

    .topbar::after {
      content: none;
    }

    .brand-row {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
      align-items: center;
    }

    .eyebrow {
      display: inline-flex;
      width: auto;
      margin: 0 0 4px;
      border: 1px solid rgba(255, 212, 59, 0.35);
      border-radius: 999px;
      padding: 4px 8px;
      color: var(--yellow);
      background: rgba(255, 212, 59, 0.10);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 5.6vw, 32px);
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .subtitle {
      display: none;
      max-width: 520px;
      margin: 5px 0 0;
      color: rgba(255, 255, 255, 0.74);
      font-size: 13px;
      line-height: 1.35;
    }

    .hero-chip {
      display: none;
    }

    .tabs {
      position: relative;
      z-index: 1;
      margin-top: 9px;
      padding: 3px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      gap: 4px;
    }

    .tab-button {
      min-height: 38px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: rgba(255, 255, 255, 0.78);
      font-size: 14px;
      font-weight: 900;
    }

    .tab-button.active {
      background: var(--yellow);
      color: var(--black);
      box-shadow: 0 10px 20px rgba(255, 212, 59, 0.18);
    }

    .content {
      padding: 8px 0 24px;
    }

    .panel {
      margin-top: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: var(--card);
      box-shadow: 0 12px 34px rgba(15, 23, 42, 0.08);
      backdrop-filter: blur(12px);
    }

    .panel:first-child {
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 0 0 12px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 950;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .panel-title::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .field-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(120px, 0.7fr);
      gap: 10px;
    }

    .field {
      min-width: 0;
    }

    label {
      display: block;
      margin: 0 0 6px;
      color: #475569;
      font-size: 11px;
      font-weight: 950;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    input,
    select,
    button {
      border-radius: 8px;
      font-size: 16px;
    }

    input,
    select {
      min-height: 50px;
      margin-bottom: 0;
      border: 1px solid #cbd5e1;
      padding: 12px 13px;
      background: white;
      color: var(--ink);
      outline: none;
      box-shadow: 0 1px 0 rgba(15, 23, 42, 0.03);
    }

    input:focus,
    select:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.16);
    }

    button {
      min-height: 50px;
      border: 0;
      background: var(--black);
      color: white;
      font-weight: 950;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: transform 120ms ease, filter 120ms ease, opacity 120ms ease;
    }

    button:active {
      transform: translateY(1px);
    }

    button.secondary {
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--black);
    }

    .quick-points {
      margin: 10px 0 12px;
      gap: 7px;
    }

    .quick-points button {
      min-height: 48px;
      border: 1px solid rgba(245, 158, 11, 0.26);
      border-radius: 8px;
      background: #fff7d6;
      color: #92400e;
      font-size: 16px;
      font-weight: 950;
    }

    .quick-points button.active {
      border-color: var(--yellow);
      background: var(--yellow);
      color: var(--black);
      box-shadow: 0 10px 22px rgba(245, 158, 11, 0.20);
    }

    .manual-row,
    .filter-row,
    .actions {
      gap: 10px;
    }

    .filter-row {
      grid-template-columns: minmax(0, 1fr) minmax(160px, 0.75fr) auto;
      align-items: end;
    }

    .manual-row {
      grid-template-columns: minmax(0, 1fr) 118px;
    }

    .manual-row button,
    .filter-row button {
      width: auto;
    }

    #manualButton,
    #addButton {
      background: linear-gradient(135deg, #111827, #334155);
    }

    #startButton {
      min-height: 56px;
      margin-top: 12px;
      border: 1px solid rgba(255, 212, 59, 0.55);
      background: linear-gradient(135deg, #ffd43b, #f59e0b);
      color: #111827;
      box-shadow: 0 14px 26px rgba(245, 158, 11, 0.24);
    }

    #reader {
      min-height: 0;
      margin-top: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0f172a;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    #reader video {
      border-radius: 8px;
    }

    .result {
      margin-top: 12px;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 15px;
      line-height: 1.35;
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.06);
    }

    .success {
      background: #dcfce7;
      color: #14532d;
      border: 1px solid #86efac;
    }

    .error {
      background: #fee2e2;
      color: #7f1d1d;
      border: 1px solid #fecaca;
    }

    .loading,
    .scanning {
      background: #e0f2fe;
      color: #075985;
      border: 1px solid #bae6fd;
    }

    .queued {
      background: #fef3c7;
      color: #78350f;
      border: 1px solid #fde68a;
    }

    .recent-panel {
      margin-top: 14px;
      border-top: 1px solid var(--line);
      padding-top: 12px;
    }

    .recent-panel h3 {
      margin: 0 0 9px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 950;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .recent-list,
    .student-list {
      gap: 9px;
      padding-bottom: 10px;
    }

    .recent-item,
    .student-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px 12px;
      background: #ffffff;
      color: #334155;
      box-shadow: 0 7px 18px rgba(15, 23, 42, 0.05);
    }

    .student-card {
      grid-template-columns: minmax(0, 1fr) auto;
    }

    .student-card:active {
      background: #fff7d6;
      transform: scale(0.995);
    }

    .student-name {
      color: var(--ink);
      font-size: 15px;
      font-weight: 950;
    }

    .student-meta {
      color: var(--muted);
      font-size: 12px;
    }

    .points {
      border-radius: 999px;
      padding: 7px 10px;
      background: #dcfce7;
      color: #166534;
      font-size: 13px;
      font-weight: 950;
    }

    .empty {
      border: 1px dashed #cbd5e1;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
    }

    .admin-grid {
      display: grid;
      gap: 10px;
    }

    .admin-form-grid {
      display: grid;
      grid-template-columns: minmax(0, 0.75fr) minmax(0, 1.25fr);
      gap: 10px;
    }

    .admin-form-grid .wide {
      grid-column: 1 / -1;
    }

    .admin-summary {
      display: none;
      margin: 10px 0 0;
      border: 1px solid rgba(245, 158, 11, 0.22);
      border-radius: 8px;
      padding: 10px 12px;
      background: #fff7d6;
      color: #78350f;
      font-size: 13px;
      font-weight: 900;
      line-height: 1.35;
    }

    .sync-button {
      display: none;
      margin-top: 10px;
      border: 1px solid rgba(245, 158, 11, 0.28);
      background: #ffffff;
      color: var(--black);
    }

    @media (max-width: 680px) {
      .app {
        padding: 10px;
      }

      .topbar {
        padding: 9px 10px 10px;
      }

      .brand-row {
        grid-template-columns: 1fr;
      }

      .hero-chip {
        display: none;
      }

      .content {
        padding-top: 8px;
      }

      .panel {
        padding: 12px;
      }

      .field-grid,
      .manual-row,
      .filter-row,
      .actions,
      .admin-form-grid {
        grid-template-columns: 1fr;
      }

      .manual-row button,
      .filter-row button {
        width: 100%;
      }

      .quick-points {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .student-card {
        grid-template-columns: 1fr auto;
      }

      .points {
        text-align: right;
      }
    }

    @media (max-width: 390px) {
      h1 {
        font-size: 25px;
      }

      .quick-points button {
        min-height: 44px;
        padding: 8px 4px;
      }

      input,
      select,
      button {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand-row">
        <div>
          <p class="eyebrow">Recitation Central</p>
          <h1>Fast Scanner</h1>
          <p class="subtitle">Queue scans quickly, prevent duplicate logs, and manage students in one reliable mobile view.</p>
        </div>
        <div class="hero-chip">+1</div>
      </div>
      <div class="tabs">
        <button id="scannerTab" class="tab-button active" type="button">Scanner</button>
        <button id="adminTab" class="tab-button" type="button">Admin</button>
      </div>
    </header>

    <section class="content">
      <div id="scannerView" class="view active">
        <div class="panel scan-panel">
          <p class="panel-title">Scan Settings</p>
          <div class="field-grid">
            <div class="field">
              <label for="activity">Activity</label>
              <input type="text" id="activity" value="Recitation" placeholder="Activity Name">
            </div>
            <div class="field">
              <label for="points">Points</label>
              <input type="number" id="points" value="1" min="1" placeholder="Points to award">
            </div>
          </div>
          <div class="quick-points">
            <button class="quick-point active" type="button" data-points="1">+1</button>
            <button class="quick-point" type="button" data-points="2">+2</button>
            <button class="quick-point" type="button" data-points="3">+3</button>
            <button class="quick-point" type="button" data-points="5">+5</button>
          </div>
          <div class="manual-row">
            <input type="text" id="manualStudentId" placeholder="Type Student ID manually">
            <button id="manualButton" type="button">Record</button>
          </div>
          <button id="startButton" type="button">Start Camera Scanner</button>
          <div id="reader"></div>
          <div id="scannerResult" class="result"></div>
          <button id="syncPendingButton" class="sync-button" type="button">Sync Pending Now</button>
          <div id="recentPanel" class="recent-panel">
            <h3>Recent Scans</h3>
            <div id="recentList" class="recent-list"></div>
          </div>
        </div>
      </div>

      <div id="adminView" class="view">
        <div class="panel">
          <p class="panel-title">Teacher Access</p>
          <input type="password" id="pin" placeholder="Teacher PIN">
        </div>

        <div class="panel">
          <p class="panel-title">Add / Edit Student</p>
          <div class="admin-form-grid">
            <div class="field">
              <label for="adminStudentId">Student ID</label>
              <input type="text" id="adminStudentId" placeholder="Student ID">
            </div>
            <div class="field">
              <label for="adminFullName">Full Name</label>
              <input type="text" id="adminFullName" placeholder="Full Name">
            </div>
            <div class="field wide">
              <label for="adminSection">Section</label>
              <input type="text" id="adminSection" list="sectionOptions" placeholder="Section">
              <datalist id="sectionOptions"></datalist>
            </div>
          </div>
          <div class="actions">
            <button id="addButton" type="button">Add Student</button>
            <button id="editButton" class="secondary" type="button">Save Edit</button>
          </div>
        </div>

        <div id="adminResult" class="result"></div>

        <div class="panel">
          <p class="panel-title">Students</p>
          <div class="filter-row">
            <div class="field">
              <label for="sectionFilter">Section Filter</label>
              <select id="sectionFilter">
                <option value="">All sections</option>
              </select>
            </div>
            <div class="field">
              <label for="adminSort">Sort</label>
              <select id="adminSort">
                <option value="mostPoints">Most Points</option>
                <option value="latest">Latest Recitation</option>
                <option value="az">Name A-Z</option>
                <option value="lowestPoints">Lowest Points</option>
              </select>
            </div>
            <button id="refreshButton" class="secondary" type="button">Refresh</button>
          </div>
          <input type="search" id="adminSearch" placeholder="Search student name or ID">
          <div id="adminSummary" class="admin-summary"></div>
          <div id="studentList" class="student-list"></div>
        </div>
      </div>
    </section>
  </main>

    <script>
    const SCANNER_API_URL = "https://script.google.com/macros/s/AKfycbw_p9PbNEfBxTCw2LamJ8aBxI9Y7-QUMCeNUAhrU3h0qu3CoUAqWGug3I4jORIzSY0U/exec";
    const ADMIN_API_URL = "https://script.google.com/macros/s/AKfycbwFpn8Pe0qu1YgibZzlbsOwB0ijK078Z2aWaykB0bn5LJzWdmrjW3xbuyVTz16qTJMqlA/exec";

    const scannerTab = document.getElementById("scannerTab");
    const adminTab = document.getElementById("adminTab");
    const scannerView = document.getElementById("scannerView");
    const adminView = document.getElementById("adminView");

    function switchView(viewName) {
      const showScanner = viewName === "scanner";
      scannerTab.classList.toggle("active", showScanner);
      adminTab.classList.toggle("active", !showScanner);
      scannerView.classList.toggle("active", showScanner);
      adminView.classList.toggle("active", !showScanner);
    }

    scannerTab.addEventListener("click", () => switchView("scanner"));
    adminTab.addEventListener("click", () => switchView("admin"));

    const startButton = document.getElementById("startButton");
    const manualButton = document.getElementById("manualButton");
    const manualStudentId = document.getElementById("manualStudentId");
    const pointsInput = document.getElementById("points");
    const scannerResult = document.getElementById("scannerResult");
    const syncPendingButton = document.getElementById("syncPendingButton");
    const recentPanel = document.getElementById("recentPanel");
    const recentList = document.getElementById("recentList");
    const quickPointButtons = Array.from(document.querySelectorAll(".quick-point"));
    const scanner = new Html5Qrcode("reader", {
      formatsToSupport: [Html5QrcodeSupportedFormats.QR_CODE],
      verbose: false
    });

    const SCAN_COOLDOWN_MS = 6000;
    const SCANNER_PAUSE_MS = 260;
    const REQUEST_TIMEOUT_MS = 18000;
    const SCANNER_REQUEST_TIMEOUT_MS = 30000;
    const PENDING_SCANS_KEY = "recitationPendingScansV1";
    const REVIEW_SCANS_KEY = "recitationReviewScansV1";
    const STUDENT_CACHE_KEY = "recitationStudentCacheV1";
    const BATCH_SYNC_SIZE = 5;

    let scanPauseActive = false;
    let queueProcessing = false;
    let scannerStarted = false;
    let audioContext = null;
    let lastLocalRecordAt = 0;
    const recentScans = [];
    let scanQueue = loadPendingScans();
    let localStudentCache = loadStudentCache();
    const recentScanLocks = new Map();
    const duplicateNoticeLocks = new Map();

    function showResult(target, type, message) {
      target.style.display = "block";
      target.className = "result " + type;
      target.innerText = message;
    }

    function vibrate(pattern) {
      if ("vibrate" in navigator) {
        navigator.vibrate(pattern);
      }
    }

    function unlockFeedback() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;
      if (!audioContext) audioContext = new AudioContext();
      if (audioContext.state === "suspended") audioContext.resume();
    }

    function beep(frequency, duration, volume) {
      unlockFeedback();
      if (!audioContext || audioContext.state !== "running") return;

      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();
      oscillator.type = "sine";
      oscillator.frequency.value = frequency;
      gain.gain.value = volume;
      oscillator.connect(gain);
      gain.connect(audioContext.destination);
      oscillator.start();
      setTimeout(() => oscillator.stop(), duration);
    }

    function playSuccessFeedback() {
      vibrate(80);
      beep(880, 90, 0.08);
    }

    function playErrorFeedback() {
      vibrate([80, 60, 140]);
      beep(220, 160, 0.1);
    }

    function callJsonp(url, params, prefix, timeoutMs = REQUEST_TIMEOUT_MS) {
      return new Promise((resolve, reject) => {
        const callbackName = prefix + Date.now() + "_" + Math.floor(Math.random() * 100000);
        const script = document.createElement("script");
        const query = new URLSearchParams();

        Object.keys(params).forEach((key) => {
          query.set(key, params[key]);
        });

        query.set("callback", callbackName);

        const timeoutId = setTimeout(() => {
          cleanup();
          reject(new Error("Backend request timed out."));
        }, timeoutMs);

        function cleanup() {
          clearTimeout(timeoutId);
          delete window[callbackName];
          script.remove();
        }

        window[callbackName] = (data) => {
          cleanup();
          resolve(data);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error("Could not reach backend."));
        };

        script.src = url + "?" + query.toString();
        document.body.appendChild(script);
      });
    }

    function addRecentScan(message) {
      recentScans.unshift(message);
      if (recentScans.length > 5) recentScans.pop();
      recentPanel.style.display = "block";
      recentList.innerHTML = "";

      recentScans.forEach((scan) => {
        const item = document.createElement("div");
        item.className = "recent-item";
        item.innerText = scan;
        recentList.appendChild(item);
      });
    }

    function updateQuickPointButtons() {
      const selectedPoints = pointsInput.value;
      quickPointButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.points === selectedPoints);
      });
    }

    function loadPendingScans() {
      try {
        const stored = JSON.parse(localStorage.getItem(PENDING_SCANS_KEY) || "[]");
        return Array.isArray(stored) ? stored : [];
      } catch (error) {
        return [];
      }
    }

    function savePendingScans() {
      localStorage.setItem(PENDING_SCANS_KEY, JSON.stringify(scanQueue));
      updateSyncPendingButton();
    }

    function loadReviewScans() {
      try {
        const stored = JSON.parse(localStorage.getItem(REVIEW_SCANS_KEY) || "[]");
        return Array.isArray(stored) ? stored : [];
      } catch (error) {
        return [];
      }
    }

    function saveReviewScans(scans) {
      localStorage.setItem(REVIEW_SCANS_KEY, JSON.stringify(scans));
    }

    function moveScansToReview(scans, reason) {
      if (!scans.length) return;

      const reviewScans = loadReviewScans();
      scans.forEach((scanItem) => {
        reviewScans.unshift({
          ...scanItem,
          reviewReason: reason || "Needs checking",
          reviewAt: Date.now()
        });
      });

      saveReviewScans(reviewScans.slice(0, 100));
      updateSyncPendingButton();
    }

    function showReviewScans() {
      const reviewScans = loadReviewScans();

      if (!reviewScans.length) {
        showResult(scannerResult, "success", "No scans need review.");
        return;
      }

      const preview = reviewScans.slice(0, 5).map((scanItem) => {
        const name = scanItem.cachedName ? scanItem.cachedName + " " : "";
        return name + "(" + scanItem.studentId + ") - " + (scanItem.reviewReason || "Needs checking");
      }).join("\n");

      showResult(
        scannerResult,
        "queued",
        "Needs Review: " + reviewScans.length + " scan(s)\n" + preview
      );
    }

    function getPendingText() {
      const count = scanQueue.length;
      return count + " pending sync" + (count === 1 ? "" : "s");
    }

    function updateSyncPendingButton() {
      const reviewCount = loadReviewScans().length;
      syncPendingButton.style.display = scanQueue.length > 0 || reviewCount > 0 ? "block" : "none";
      syncPendingButton.innerText = scanQueue.length > 0
        ? "Sync Pending Now (" + scanQueue.length + ")"
        : reviewCount > 0
          ? "Needs Review (" + reviewCount + ")"
        : "Sync Pending Now";
    }

    function normalizeCacheId(studentId) {
      return String(studentId || "").trim().toUpperCase();
    }

    function loadStudentCache() {
      try {
        const stored = JSON.parse(localStorage.getItem(STUDENT_CACHE_KEY) || "{}");
        return stored && typeof stored === "object" && stored.students ? stored : {
          students: {},
          count: 0,
          updatedAt: 0
        };
      } catch (error) {
        return {
          students: {},
          count: 0,
          updatedAt: 0
        };
      }
    }

    function saveStudentCache(cacheData) {
      localStudentCache = cacheData;
      localStorage.setItem(STUDENT_CACHE_KEY, JSON.stringify(cacheData));
    }

    function cacheStudentsLocally(students) {
      const studentMap = {};

      (students || []).forEach((student) => {
        const key = normalizeCacheId(student.studentId);
        if (!key) return;

        studentMap[key] = {
          studentId: String(student.studentId || "").trim(),
          fullName: String(student.fullName || "").trim(),
          section: String(student.section || "").trim()
        };
      });

      saveStudentCache({
        students: studentMap,
        count: Object.keys(studentMap).length,
        updatedAt: Date.now()
      });
    }

    function getCachedStudent(studentId) {
      return localStudentCache.students[normalizeCacheId(studentId)] || null;
    }

    function hasLocalStudentCache() {
      return Boolean(localStudentCache.count && Object.keys(localStudentCache.students || {}).length);
    }

    async function refreshStudentCacheFromBackend() {
      if (!navigator.onLine) return false;

      try {
        const data = await callJsonp(ADMIN_API_URL, {
          action: "publicLeaderboard",
          section: ""
        }, "studentCacheCallback_", REQUEST_TIMEOUT_MS);

        if (data && data.status === "success" && Array.isArray(data.students)) {
          cacheStudentsLocally(data.students);
          return true;
        }
      } catch (error) {
        return false;
      }

      return false;
    }

    function normalizeStudentId(studentIdValue) {
      return String(studentIdValue || "").trim();
    }

    function buildScanKey(studentId, activity, points) {
      return [
        studentId.toUpperCase(),
        activity.toUpperCase(),
        String(points)
      ].join("|");
    }

    function cleanupScanLocks() {
      const now = Date.now();
      recentScanLocks.forEach((expiresAt, key) => {
        if (expiresAt <= now) recentScanLocks.delete(key);
      });
      duplicateNoticeLocks.forEach((expiresAt, key) => {
        if (expiresAt <= now) duplicateNoticeLocks.delete(key);
      });
    }

    function showDuplicateNotice(key, studentId) {
      cleanupScanLocks();
      if (duplicateNoticeLocks.has(key)) return;

      duplicateNoticeLocks.set(key, Date.now() + 1200);
      showResult(
        scannerResult,
        "queued",
        "Duplicate scan ignored for " + studentId + ".\nMove to the next student."
      );
    }

    function pauseScannerBriefly() {
      if (!scannerStarted || scanPauseActive) return;

      scanPauseActive = true;

      try {
        scanner.pause(true);
      } catch (error) {
        // Scanner may already be paused while the camera warms up.
      }

      setTimeout(() => {
        scanPauseActive = false;
        if (!scannerStarted) return;

        try {
          scanner.resume();
        } catch (error) {
          // Scanner may already be running.
        }
      }, SCANNER_PAUSE_MS);
    }

    function prepareScan(studentIdValue) {
      const studentId = String(studentIdValue || "").trim();
      const activity = document.getElementById("activity").value.trim();
      const points = Number(pointsInput.value);

      if (!studentId) {
        showResult(scannerResult, "error", "Please enter or scan a Student ID.");
        return null;
      }

      const cachedStudent = getCachedStudent(studentId);

      if (!navigator.onLine && !hasLocalStudentCache()) {
        showResult(
          scannerResult,
          "error",
          "Offline validation unavailable.\nOpen the app online once to save the student list."
        );
        playErrorFeedback();
        return null;
      }

      if (!navigator.onLine && hasLocalStudentCache() && !cachedStudent) {
        showResult(
          scannerResult,
          "error",
          "Unknown Student ID while offline: " + studentId + "\nScan was not accepted."
        );
        playErrorFeedback();
        return null;
      }

      if (!activity) {
        showResult(scannerResult, "error", "Please enter an activity name.");
        return null;
      }

      if (!Number.isFinite(points) || points <= 0) {
        showResult(scannerResult, "error", "Please enter valid points.");
        return null;
      }

      cleanupScanLocks();

      const key = buildScanKey(studentId, activity, points);
      if (recentScanLocks.has(key)) {
        showDuplicateNotice(key, studentId);
        return null;
      }

      recentScanLocks.set(key, Date.now() + SCAN_COOLDOWN_MS);

      return {
        id: "scan_" + Date.now() + "_" + Math.floor(Math.random() * 100000),
        key,
        studentId,
        cachedName: cachedStudent ? cachedStudent.fullName : "",
        cachedSection: cachedStudent ? cachedStudent.section : "",
        activity,
        points,
        attempts: 0,
        createdAt: Date.now()
      };
    }

    function enqueueScan(scanItem) {
      scanQueue.push(scanItem);
      savePendingScans();
      lastLocalRecordAt = Date.now();
      const displayName = scanItem.cachedName
        ? scanItem.cachedName + " (" + scanItem.studentId + ")"
        : scanItem.studentId;
      showResult(
        scannerResult,
        "success",
        "Recorded: " + displayName + " (+" + scanItem.points + ")\nReady for next student."
      );
      playSuccessFeedback();
      addRecentScan("Pending sync: " + displayName + " +" + scanItem.points);
      setTimeout(processScanQueue, 250);
    }

    function canShowSyncStatus() {
      return Date.now() - lastLocalRecordAt > 1800;
    }

    async function processScanQueue(forceStatus = false) {
      if (queueProcessing) return;
      if (!navigator.onLine) {
        if (forceStatus) {
          showResult(scannerResult, "queued", "No internet connection.\n" + getPendingText() + " saved on this device.");
        }
        return;
      }

      queueProcessing = true;

      while (scanQueue.length > 0) {
        if (!navigator.onLine) break;

        const batch = scanQueue.slice(0, BATCH_SYNC_SIZE);
        batch.forEach((scanItem) => {
          scanItem.attempts = Number(scanItem.attempts || 0) + 1;
        });
        savePendingScans();

        if (forceStatus || canShowSyncStatus()) {
          showResult(
            scannerResult,
            "scanning",
            "Syncing " + batch.length + " scan(s)...\n" + getPendingText()
          );
        }

        let syncResult = await sendScanBatchToBackend(batch);

        if (!syncResult.ok) {
          if (batch.length > 1) {
            if (forceStatus || canShowSyncStatus()) {
              showResult(
                scannerResult,
                "scanning",
                "Batch sync failed. Trying one-by-one...\n" + getPendingText()
              );
            }

            syncResult = await sendScanToBackend(batch[0]);
          }
        }

        if (!syncResult.ok) {
          showResult(
            scannerResult,
            "queued",
            "Backend sync delayed.\n" + getPendingText() + " saved on this device."
          );
          break;
        }

        const removeIds = new Set(syncResult.removeIds || []);
        scanQueue = scanQueue.filter((scanItem) => !removeIds.has(scanItem.id));
        savePendingScans();
      }

      queueProcessing = false;

      if (scanQueue.length === 0 && (forceStatus || canShowSyncStatus())) {
        const reviewCount = loadReviewScans().length;
        showResult(
          scannerResult,
          reviewCount ? "queued" : "success",
          reviewCount
            ? "Pending sync done. " + reviewCount + " scan(s) need review."
            : "All pending scans are synced."
        );
      }
    }

    async function sendScanToBackend(scanItem) {
      try {
        const data = await callJsonp(SCANNER_API_URL, {
          qrText: scanItem.studentId,
          activity: scanItem.activity,
          points: String(scanItem.points),
          requestId: scanItem.id
        }, "scannerCallback_", SCANNER_REQUEST_TIMEOUT_MS);

        const resultType = data.status === "success"
          ? "success"
          : data.status === "duplicate"
            ? "queued"
            : "error";

        if (data.status !== "success" && data.status !== "duplicate") {
          showResult(scannerResult, resultType, data.message);
        } else if (canShowSyncStatus()) {
          showResult(scannerResult, resultType, data.message);
        }

        if (data.status === "success") {
          addRecentScan(data.message);
          return { ok: true, removeIds: [scanItem.id] };
        } else if (data.status === "duplicate") {
          addRecentScan(data.message);
          return { ok: true, removeIds: [scanItem.id] };
        } else {
          playErrorFeedback();
          addRecentScan(data.message || "Scan was rejected by backend.");
          recentScanLocks.delete(scanItem.key);

          const message = String(data.message || "");
          const isPermanentError =
            message.includes("Student ID not found") ||
            message.includes("Invalid Student ID") ||
            message.includes("Invalid points") ||
            message.includes("Activity description is required");

          if (isPermanentError) {
            moveScansToReview([scanItem], data.message || "Invalid scan");
            return { ok: true, removeIds: [scanItem.id] };
          }

          return { ok: false, removeIds: [] };
        }
      } catch (error) {
        showResult(
          scannerResult,
          "queued",
          "Backend did not respond yet.\n" +
            scanItem.studentId + " stays pending and will retry."
        );
        return { ok: false, removeIds: [] };
      }
    }

    async function sendScanBatchToBackend(batch) {
      if (batch.length === 1) {
        return sendScanToBackend(batch[0]);
      }

      try {
        const data = await callJsonp(SCANNER_API_URL, {
          scans: JSON.stringify(batch.map((scanItem) => ({
            studentId: scanItem.studentId,
            qrText: scanItem.studentId,
            activity: scanItem.activity,
            points: String(scanItem.points),
            requestId: scanItem.id
          })))
        }, "scannerBatchCallback_", SCANNER_REQUEST_TIMEOUT_MS);

        const resultType = data.status === "success" || data.status === "partial" ? "success" : "error";
        if ((data.status !== "success" && data.status !== "partial") || canShowSyncStatus()) {
          showResult(scannerResult, resultType, data.message || "Batch sync finished.");
        }

        if ((data.status === "success" || data.status === "partial") && Array.isArray(data.results)) {
          const resultMap = new Map(data.results.map((result) => [String(result.requestId || ""), result]));
          const removeIds = [];
          const reviewScans = [];

          batch.forEach((scanItem) => {
            const result = resultMap.get(scanItem.id);
            if (!result) return;

            if (result.status === "success" || result.status === "duplicate") {
              removeIds.push(scanItem.id);
              return;
            }

            reviewScans.push({
              ...scanItem,
              backendMessage: result.message || "Scan needs checking"
            });
            removeIds.push(scanItem.id);
          });

          if (reviewScans.length) {
            moveScansToReview(
              reviewScans,
              reviewScans.map((scanItem) => scanItem.backendMessage).join("; ")
            );
            addRecentScan(reviewScans.length + " scan(s) moved to Needs Review.");
          }

          addRecentScan(data.message || "Batch sync finished.");
          return { ok: true, removeIds };
        }

        if (data.status === "success") {
          addRecentScan(data.message || "Batch sync finished.");
          return { ok: true, removeIds: batch.map((scanItem) => scanItem.id) };
        }

        playErrorFeedback();
        addRecentScan(data.message || "Batch sync failed. Pending scans were kept.");
        return { ok: false, removeIds: [] };
      } catch (error) {
        showResult(
          scannerResult,
          "queued",
          "Backend did not respond yet.\n" + batch.length + " scan(s) stay pending."
        );
        return { ok: false, removeIds: [] };
      }
    }

    function recordManualStudentId() {
      unlockFeedback();

      const studentId = manualStudentId.value.trim();
      if (!studentId) {
        showResult(scannerResult, "error", "Please type a Student ID.");
        manualStudentId.focus();
        return;
      }

      const scanItem = prepareScan(studentId);
      if (!scanItem) return;

      manualButton.disabled = true;
      manualStudentId.value = "";
      enqueueScan(scanItem);

      setTimeout(() => {
        manualButton.disabled = false;
      }, 150);
    }

    async function startScanner() {
      if (scannerStarted) return;
      unlockFeedback();
      startButton.disabled = true;
      showResult(scannerResult, "scanning", "Starting camera...");

      try {
        await scanner.start(
          { facingMode: "environment" },
          { fps: 15, qrbox: { width: 220, height: 220 }, aspectRatio: 1, disableFlip: true },
          (decodedText) => {
            if (scanPauseActive) return;

            const scanItem = prepareScan(normalizeStudentId(decodedText));
            pauseScannerBriefly();

            if (scanItem) enqueueScan(scanItem);
          }
        );

        scannerStarted = true;
        showResult(scannerResult, "success", "Camera scanner ready.");
      } catch (error) {
        startButton.disabled = false;
        showResult(scannerResult, "error", "Camera Error: " + error.message);
      }
    }

    startButton.addEventListener("click", startScanner);
    manualButton.addEventListener("click", recordManualStudentId);
    pointsInput.addEventListener("input", updateQuickPointButtons);
    quickPointButtons.forEach((button) => {
      button.addEventListener("click", () => {
        unlockFeedback();
        pointsInput.value = button.dataset.points;
        updateQuickPointButtons();
      });
    });
    manualStudentId.addEventListener("keydown", (event) => {
      if (event.key === "Enter") recordManualStudentId();
    });

    const pinInput = document.getElementById("pin");
    const adminStudentId = document.getElementById("adminStudentId");
    const adminFullName = document.getElementById("adminFullName");
    const adminSection = document.getElementById("adminSection");
    const sectionOptions = document.getElementById("sectionOptions");
    const addButton = document.getElementById("addButton");
    const editButton = document.getElementById("editButton");
    const refreshButton = document.getElementById("refreshButton");
    const sectionFilter = document.getElementById("sectionFilter");
    const adminSort = document.getElementById("adminSort");
    const adminSearch = document.getElementById("adminSearch");
    const adminSummary = document.getElementById("adminSummary");
    const studentList = document.getElementById("studentList");
    const adminResult = document.getElementById("adminResult");
    let currentAdminStudents = [];

    function setAdminBusy(isBusy) {
      addButton.disabled = isBusy;
      editButton.disabled = isBusy;
      refreshButton.disabled = isBusy;
    }

    function getPin() {
      const pin = pinInput.value.trim();
      if (!pin) {
        showResult(adminResult, "error", "Enter teacher PIN first.");
        pinInput.focus();
      }
      return pin;
    }

    async function runAdminAction(params) {
      if (ADMIN_API_URL.includes("PASTE_ADMIN")) {
        showResult(adminResult, "error", "Set ADMIN_API_URL first.");
        return null;
      }

      const pin = getPin();
      if (!pin) return null;

      setAdminBusy(true);
      showResult(adminResult, "loading", "Working...");

      try {
        const data = await callJsonp(ADMIN_API_URL, {
          ...params,
          pin
        }, "adminCallback_");
        showResult(adminResult, data.status === "success" ? "success" : "error", data.message || "Done.");
        return data;
      } catch (error) {
        showResult(adminResult, "error", "System Error: " + error.message);
        return null;
      } finally {
        setAdminBusy(false);
      }
    }

    function renderSections(sections) {
      const currentValue = sectionFilter.value;
      sectionFilter.innerHTML = '<option value="">All sections</option>';
      sectionOptions.innerHTML = "";

      sections.forEach((sectionName) => {
        const filterOption = document.createElement("option");
        filterOption.value = sectionName;
        filterOption.innerText = sectionName;
        sectionFilter.appendChild(filterOption);

        const inputOption = document.createElement("option");
        inputOption.value = sectionName;
        sectionOptions.appendChild(inputOption);
      });

      sectionFilter.value = currentValue;
    }

    function getLatestValue(student) {
      return Number(student.latestRecitationMillis || student.latestRecitationRow || 0);
    }

    function compareByName(a, b) {
      return String(a.fullName || "").localeCompare(String(b.fullName || ""));
    }

    function getVisibleAdminStudents() {
      const query = adminSearch.value.trim().toLowerCase();
      const sortMode = adminSort.value;

      let students = currentAdminStudents.slice();

      if (query) {
        students = students.filter((student) => {
          const haystack = [
            student.studentId,
            student.fullName,
            student.section
          ].join(" ").toLowerCase();
          return haystack.includes(query);
        });
      }

      students.sort((a, b) => {
        if (sortMode === "latest") {
          return getLatestValue(b) - getLatestValue(a) || compareByName(a, b);
        }

        if (sortMode === "lowestPoints") {
          return Number(a.totalPoints || 0) - Number(b.totalPoints || 0) ||
            getLatestValue(b) - getLatestValue(a) ||
            compareByName(a, b);
        }

        if (sortMode === "az") {
          return compareByName(a, b);
        }

        return Number(b.totalPoints || 0) - Number(a.totalPoints || 0) ||
          getLatestValue(b) - getLatestValue(a) ||
          compareByName(a, b);
      });

      return students;
    }

    function renderAdminSummary(students) {
      if (!students.length) {
        adminSummary.style.display = "none";
        adminSummary.innerText = "";
        return;
      }

      const topStudent = students.reduce((top, student) => {
        if (!top) return student;
        return Number(student.totalPoints || 0) > Number(top.totalPoints || 0) ? student : top;
      }, null);

      const latestStudent = students
        .slice()
        .sort((a, b) => getLatestValue(b) - getLatestValue(a))[0];

      const latestText = latestStudent && getLatestValue(latestStudent)
        ? " | Latest: " + latestStudent.fullName
        : "";

      adminSummary.style.display = "block";
      adminSummary.innerText = students.length + " student(s) shown | Top: " +
        topStudent.fullName + " (" + Number(topStudent.totalPoints || 0) + " pts)" +
        latestText;
    }

    function refreshAdminStudentsView() {
      const students = getVisibleAdminStudents();
      renderAdminSummary(students);
      renderStudents(students);
    }

    function renderStudents(students) {
      studentList.innerHTML = "";

      if (students.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.innerText = "No students found.";
        studentList.appendChild(empty);
        return;
      }

      students.forEach((student) => {
        const card = document.createElement("div");
        const details = document.createElement("div");
        const name = document.createElement("div");
        const meta = document.createElement("div");
        const points = document.createElement("div");

        card.className = "student-card";
        name.className = "student-name";
        meta.className = "student-meta";
        points.className = "points";
        name.innerText = student.fullName;
        meta.innerText = student.studentId + " | " + student.section +
          (student.latestRecitationText ? "\nLatest: " + student.latestRecitationText : "");
        points.innerText = student.totalPoints + " pts";

        details.appendChild(name);
        details.appendChild(meta);
        card.appendChild(details);
        card.appendChild(points);

        card.addEventListener("click", () => {
          adminStudentId.value = student.studentId;
          adminFullName.value = student.fullName;
          adminSection.value = student.section;
          window.scrollTo({ top: 0, behavior: "smooth" });
        });

        studentList.appendChild(card);
      });
    }

    async function loadDashboard() {
      const data = await runAdminAction({
        action: "loadDashboard",
        section: sectionFilter.value
      });

      if (!data || data.status !== "success") return;
      renderSections(data.sections || []);
      currentAdminStudents = data.students || [];
      cacheStudentsLocally(currentAdminStudents);
      refreshAdminStudentsView();
    }

    async function saveStudent(action) {
      const data = await runAdminAction({
        action,
        studentId: adminStudentId.value.trim(),
        fullName: adminFullName.value.trim(),
        section: adminSection.value.trim()
      });

      if (data && data.status === "success") {
        adminFullName.value = "";
        adminSection.value = "";
        if (data.sections && data.students) {
          renderSections(data.sections);
          currentAdminStudents = data.students;
          cacheStudentsLocally(currentAdminStudents);
          refreshAdminStudentsView();
        }
      }
    }

    addButton.addEventListener("click", () => saveStudent("addStudent"));
    editButton.addEventListener("click", () => saveStudent("editStudent"));
    refreshButton.addEventListener("click", loadDashboard);
    sectionFilter.addEventListener("change", loadDashboard);
    adminSort.addEventListener("change", refreshAdminStudentsView);
    adminSearch.addEventListener("input", refreshAdminStudentsView);
    syncPendingButton.addEventListener("click", () => {
      if (scanQueue.length === 0 && loadReviewScans().length > 0) {
        showReviewScans();
        return;
      }

      processScanQueue(true);
    });
    window.addEventListener("online", () => {
      refreshStudentCacheFromBackend();
      processScanQueue();
    });
    window.addEventListener("focus", () => processScanQueue());
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) processScanQueue();
    });

    window.addEventListener("load", () => {
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("service-worker.js").then((registration) => {
          registration.update();
        });
      }

      if (scanQueue.length > 0) {
        showResult(scannerResult, "queued", "Loaded " + getPendingText() + " from this device.");
      }

      updateSyncPendingButton();
      refreshStudentCacheFromBackend();
      processScanQueue();
    });
  </script>
</body>
</html>
