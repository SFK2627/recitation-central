<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#111827">
  <title>Firebase Recitation Scanner</title>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    :root {
      --yellow: #ffd43b;
      --gold: #f59e0b;
      --black: #111827;
      --ink: #0f172a;
      --muted: #64748b;
      --line: rgba(15, 23, 42, 0.12);
      --green: #16a34a;
      --red: #dc2626;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255, 212, 59, 0.46), transparent 34%),
        linear-gradient(135deg, #fff7d6, #f8fafc 46%, #ffffff);
    }

    main {
      width: min(760px, 100%);
      margin: 0 auto;
      padding: 14px;
    }

    .hero,
    .panel {
      border-radius: 12px;
      box-shadow: 0 16px 38px rgba(15, 23, 42, 0.10);
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
      padding: 18px;
      background: linear-gradient(135deg, #111827, #1f2937);
      color: white;
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      border: 1px solid rgba(255, 212, 59, 0.36);
      border-radius: 999px;
      padding: 0 13px;
      color: var(--yellow);
      text-decoration: none;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    .header-menu-wrap {
      position: relative;
      align-self: start;
      justify-self: end;
    }

    .heart-menu-button {
      width: 42px;
      min-height: 42px;
      border: 1px solid rgba(255, 212, 59, 0.40);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.10);
      color: var(--yellow);
      font-size: 20px;
      line-height: 1;
      box-shadow: none;
    }

    .heart-menu-button:active,
    .heart-menu-button[aria-expanded="true"] {
      background: var(--yellow);
      color: var(--black);
    }

    .heart-menu {
      position: absolute;
      top: 50px;
      right: 0;
      z-index: 30;
      width: min(300px, calc(100vw - 28px));
      border: 1px solid rgba(255, 212, 59, 0.32);
      border-radius: 16px;
      padding: 10px;
      background: rgba(17, 24, 39, 0.98);
      box-shadow: 0 20px 44px rgba(15, 23, 42, 0.30);
      color: white;
    }

    .heart-menu[hidden] {
      display: none;
    }

    .menu-home-link {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      border: 1px solid rgba(255, 212, 59, 0.30);
      border-radius: 12px;
      color: var(--yellow);
      text-decoration: none;
      font-size: 13px;
      font-weight: 950;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .heart-menu .auth-panel {
      margin: 10px 0 0;
      padding: 0;
      border: 0;
      background: transparent;
      box-shadow: none;
    }

    .heart-menu .auth-title {
      color: rgba(255, 255, 255, 0.78);
    }

    .heart-menu .auth-grid {
      grid-template-columns: 1fr;
      gap: 7px;
    }

    .heart-menu .auth-panel label {
      color: rgba(255, 255, 255, 0.72);
    }

    .heart-menu .auth-panel input,
    .heart-menu .auth-panel button {
      min-height: 40px;
      font-size: 14px;
    }

    .heart-menu .auth-panel input {
      border-color: rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.96);
    }

    .heart-menu .auth-panel button.secondary {
      border-color: rgba(255, 212, 59, 0.35);
      background: rgba(255, 255, 255, 0.10);
      color: var(--yellow);
    }

    .heart-menu .auth-panel .result {
      margin-top: 8px;
      padding: 8px;
      font-size: 12px;
    }

    .credit {
      margin-top: 8px;
      color: rgba(255, 212, 59, 0.82);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .eyebrow {
      display: inline-flex;
      border: 1px solid rgba(255, 212, 59, 0.36);
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--yellow);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 10px 0 0;
      font-size: 36px;
      line-height: 1;
    }

    .panel {
      margin-top: 12px;
      border: 1px solid var(--line);
      padding: 14px;
      background: rgba(255, 255, 255, 0.94);
    }

    label {
      display: block;
      margin: 0 0 7px;
      color: #475569;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    input,
    button {
      width: 100%;
      min-height: 52px;
      border-radius: 10px;
      font-size: 17px;
    }

    input {
      border: 1px solid #cbd5e1;
      padding: 12px;
      background: white;
      color: var(--ink);
    }

    button {
      border: 0;
      background: var(--black);
      color: white;
      font-weight: 900;
      cursor: pointer;
    }

    button.secondary {
      border: 1px solid var(--line);
      background: white;
      color: var(--black);
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .auth-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) auto auto;
      gap: 8px;
      align-items: end;
    }

    .auth-panel {
      padding: 10px;
    }

    .auth-title {
      margin: 0 0 8px;
      color: #475569;
      font-size: 11px;
      font-weight: 950;
      letter-spacing: 0.07em;
      text-transform: uppercase;
    }

    .auth-panel input,
    .auth-panel button {
      min-height: 42px;
      font-size: 14px;
    }

    .auth-panel label {
      margin-bottom: 4px;
      font-size: 10px;
    }

    .auth-panel .result {
      margin-top: 8px;
      padding: 9px;
      font-size: 13px;
    }

    .auth-panel.signed-in .auth-field,
    .auth-panel.signed-in #signInButton {
      display: none;
    }

    .auth-panel.signed-in .auth-grid {
      grid-template-columns: 1fr auto;
    }

    .quick-points {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin: 10px 0;
    }

    .quick-points button {
      border: 1px solid rgba(245, 158, 11, 0.26);
      background: #fff7d6;
      color: #92400e;
    }

    .quick-points button.active {
      border-color: var(--yellow);
      background: var(--yellow);
      color: var(--black);
    }

    .manual-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 118px;
      gap: 8px;
      margin-top: 10px;
    }

    #startButton {
      margin-top: 10px;
      background: linear-gradient(135deg, var(--yellow), var(--gold));
      color: var(--black);
    }

    #reader {
      overflow: hidden;
      margin-top: 12px;
      border-radius: 10px;
      background: #0f172a;
    }

    .result {
      display: none;
      margin-top: 12px;
      border-radius: 10px;
      padding: 13px;
      white-space: pre-line;
      text-align: center;
      font-weight: 900;
      line-height: 1.4;
    }

    .success { display: block; background: #dcfce7; color: #14532d; border: 1px solid #86efac; }
    .error { display: block; background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
    .loading { display: block; background: #e0f2fe; color: #075985; border: 1px solid #bae6fd; }
    .queued { display: block; background: #fef3c7; color: #78350f; border: 1px solid #fde68a; }

    .recent {
      display: none;
      margin-top: 12px;
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }

    .recent h2 {
      margin: 0 0 8px;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .recent-item {
      margin-top: 7px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: white;
      font-size: 14px;
      line-height: 1.35;
    }


    .action-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .action-grid #startButton {
      margin-top: 0;
    }

    .bulk-button {
      background: linear-gradient(135deg, #111827, #374151);
      color: white;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 14px;
      background: rgba(15, 23, 42, 0.62);
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      width: min(760px, 100%);
      max-height: 88vh;
      overflow: hidden;
      border-radius: 16px;
      background: #ffffff;
      box-shadow: 0 24px 72px rgba(15, 23, 42, 0.26);
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr) auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
      border-bottom: 1px solid var(--line);
      padding: 14px;
      background: linear-gradient(135deg, #111827, #1f2937);
      color: white;
    }

    .modal-header h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.1;
    }

    .modal-header p {
      margin: 5px 0 0;
      color: rgba(255, 255, 255, 0.72);
      font-size: 13px;
      font-weight: 700;
    }

    .icon-button {
      width: 42px;
      min-height: 42px;
      border: 1px solid rgba(255, 255, 255, 0.20);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.10);
      color: white;
      font-size: 22px;
      line-height: 1;
    }

    .bulk-controls {
      display: grid;
      grid-template-columns: 1.1fr 0.8fr 1fr;
      gap: 8px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: #f8fafc;
    }

    .bulk-controls select,
    .bulk-controls input {
      width: 100%;
      min-height: 44px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 10px;
      background: white;
      color: var(--ink);
      font-size: 14px;
      font-weight: 800;
    }

    .bulk-list {
      overflow: auto;
      padding: 10px 14px;
      background: #ffffff;
    }

    .bulk-tools {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      color: #475569;
      font-size: 13px;
      font-weight: 900;
    }

    .bulk-tools button {
      width: auto;
      min-height: 36px;
      padding: 0 12px;
      border: 1px solid var(--line);
      background: white;
      color: var(--black);
      font-size: 12px;
    }

    .student-check {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      margin-top: 7px;
      background: white;
      cursor: pointer;
    }

    .student-check input {
      width: 22px;
      min-height: 22px;
      accent-color: var(--gold);
    }

    .student-check strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
    }

    .student-check span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .bulk-footer {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 8px;
      align-items: center;
      border-top: 1px solid var(--line);
      padding: 12px 14px;
      background: #f8fafc;
    }

    .bulk-footer button {
      width: auto;
      min-width: 112px;
      min-height: 44px;
      padding: 0 14px;
      font-size: 14px;
    }

    .bulk-count {
      color: #475569;
      font-size: 13px;
      font-weight: 950;
    }

    @media (max-width: 560px) {
      main {
        padding: 10px;
      }

      .hero {
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 8px;
        padding: 12px;
      }

      .eyebrow {
        padding: 4px 8px;
        font-size: 10px;
      }

      h1 {
        margin-top: 7px;
        font-size: 28px;
      }

      .credit {
        margin-top: 6px;
        font-size: 9px;
      }

      .heart-menu-button {
        width: 38px;
        min-height: 38px;
        font-size: 18px;
      }

      .heart-menu {
        top: 44px;
      }

      .auth-grid,
      .manual-row,
      .action-grid,
      .bulk-controls,
      .bulk-footer {
        grid-template-columns: 1fr;
      }

      .bulk-footer button {
        width: 100%;
      }

      .home-link {
        width: fit-content;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div>
        <div class="eyebrow">Recitation Central</div>
        <h1>Firebase Scanner</h1>
        <div class="credit">Developed by Mr. John Rey Tubello (Sir JR)</div>
      </div>
      <div class="header-menu-wrap">
        <button id="heartMenuButton" class="heart-menu-button" type="button" aria-label="Open scanner menu" aria-expanded="false">♥</button>
        <div id="heartMenu" class="heart-menu" hidden>
          <a class="menu-home-link" href="firebase-index.html">Home</a>
          <section id="authPanel" class="auth-panel">
            <div class="auth-title">Teacher Sign In</div>
            <div class="auth-grid">
              <div class="auth-field">
                <label for="teacherEmail">Email</label>
                <input id="teacherEmail" type="email" autocomplete="username" placeholder="Teacher email">
              </div>
              <div class="auth-field">
                <label for="teacherPassword">Password</label>
                <input id="teacherPassword" type="password" autocomplete="current-password" placeholder="Password">
              </div>
              <button id="signInButton" type="button">Sign In</button>
              <button id="signOutButton" class="secondary" type="button" hidden>Sign Out</button>
            </div>
            <div id="authResult" class="result"></div>
          </section>
        </div>
      </div>
    </section>

    <section id="scannerPanel" class="panel" hidden>
      <label for="points">Points</label>
      <input id="points" type="number" min="1" value="1">

      <div class="quick-points">
        <button class="quick-point active" type="button" data-points="1">+1</button>
        <button class="quick-point" type="button" data-points="2">+2</button>
        <button class="quick-point" type="button" data-points="3">+3</button>
        <button class="quick-point" type="button" data-points="5">+5</button>
      </div>

      <div class="manual-row">
        <input id="manualStudentId" type="text" placeholder="Type Student ID manually">
        <button id="manualButton" type="button">Record</button>
      </div>

      <div class="action-grid">
        <button id="startButton" type="button">Start Camera Scanner</button>
        <button id="bulkButton" class="bulk-button" type="button">Bulk Recitation</button>
      </div>
      <div id="reader"></div>
      <div id="result" class="result"></div>

      <div id="recentPanel" class="recent">
        <h2>Recent Records</h2>
        <div id="recentList"></div>
      </div>
    </section>
    <div id="bulkModal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="bulkTitle">
      <section class="modal">
        <div class="modal-header">
          <div>
            <h2 id="bulkTitle">Bulk Recitation</h2>
            <p>Select students, choose points, then record once.</p>
          </div>
          <button id="closeBulkButton" class="icon-button" type="button" aria-label="Close bulk recitation">×</button>
        </div>

        <div class="bulk-controls">
          <div>
            <label for="bulkSectionFilter">Section</label>
            <select id="bulkSectionFilter"></select>
          </div>
          <div>
            <label for="bulkPoints">Points</label>
            <input id="bulkPoints" type="number" min="1" value="1">
          </div>
          <div>
            <label for="bulkSearch">Search</label>
            <input id="bulkSearch" type="search" placeholder="Name or Student ID">
          </div>
        </div>

        <div class="bulk-list">
          <div class="bulk-tools">
            <span id="bulkStatus">Loading students...</span>
            <span>
              <button id="selectVisibleButton" type="button">Select Visible</button>
              <button id="clearSelectedButton" type="button">Clear</button>
            </span>
          </div>
          <div id="bulkStudentList"></div>
        </div>

        <div class="bulk-footer">
          <div id="bulkCount" class="bulk-count">0 selected</div>
          <button id="cancelBulkButton" class="secondary" type="button">Cancel</button>
          <button id="recordBulkButton" type="button">Record Bulk</button>
        </div>
      </section>
    </div>

  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getAuth,
      onAuthStateChanged,
      signInWithEmailAndPassword,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import {
      collection,
      doc,
      getDoc,
      getDocs,
      getFirestore,
      increment,
      runTransaction,
      serverTimestamp,
      writeBatch
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBbY8IScU02QfS9Xda175wIJ2dUjrJTIo4",
      authDomain: "recitation-central.firebaseapp.com",
      projectId: "recitation-central",
      storageBucket: "recitation-central.firebasestorage.app",
      messagingSenderId: "805395065834",
      appId: "1:805395065834:web:2e71c87ab0578ef4df6093",
      measurementId: "G-BN4V8X3JE5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const authPanel = document.getElementById("authPanel");
    const scannerPanel = document.getElementById("scannerPanel");
    const teacherEmail = document.getElementById("teacherEmail");
    const teacherPassword = document.getElementById("teacherPassword");
    const signInButton = document.getElementById("signInButton");
    const signOutButton = document.getElementById("signOutButton");
    const authResult = document.getElementById("authResult");
    const heartMenuButton = document.getElementById("heartMenuButton");
    const heartMenu = document.getElementById("heartMenu");
    const pointsInput = document.getElementById("points");
    const manualStudentId = document.getElementById("manualStudentId");
    const manualButton = document.getElementById("manualButton");
    const startButton = document.getElementById("startButton");
    const bulkButton = document.getElementById("bulkButton");
    const bulkModal = document.getElementById("bulkModal");
    const closeBulkButton = document.getElementById("closeBulkButton");
    const cancelBulkButton = document.getElementById("cancelBulkButton");
    const bulkSectionFilter = document.getElementById("bulkSectionFilter");
    const bulkPoints = document.getElementById("bulkPoints");
    const bulkSearch = document.getElementById("bulkSearch");
    const bulkStatus = document.getElementById("bulkStatus");
    const bulkStudentList = document.getElementById("bulkStudentList");
    const bulkCount = document.getElementById("bulkCount");
    const selectVisibleButton = document.getElementById("selectVisibleButton");
    const clearSelectedButton = document.getElementById("clearSelectedButton");
    const recordBulkButton = document.getElementById("recordBulkButton");
    const resultBox = document.getElementById("result");
    const recentPanel = document.getElementById("recentPanel");
    const recentList = document.getElementById("recentList");
    const quickPointButtons = Array.from(document.querySelectorAll(".quick-point"));

    const scanner = new Html5Qrcode("reader", {
      formatsToSupport: [Html5QrcodeSupportedFormats.QR_CODE],
      verbose: false
    });

    const SCAN_COOLDOWN_MS = 6000;
    const SCANNER_PAUSE_MS = 320;
    let scannerStarted = false;
    let scanPauseActive = false;
    let audioContext = null;
    const recentLocks = new Map();
    const recentRecords = [];
    let bulkStudents = [];
    let bulkLoaded = false;
    let bulkBusy = false;

    function setHeartMenu(open) {
      heartMenu.hidden = !open;
      heartMenuButton.setAttribute("aria-expanded", open ? "true" : "false");
    }

    function toggleHeartMenu() {
      setHeartMenu(heartMenu.hidden);
    }

    function showAuth(type, message) {
      authResult.className = "result " + type;
      authResult.textContent = message;
    }

    function showResult(type, message) {
      resultBox.className = "result " + type;
      resultBox.textContent = message;
    }

    function normalizeStudentId(value) {
      return String(value || "").trim();
    }

    function getSchoolYear(date) {
      const year = date.getFullYear();
      const month = date.getMonth() + 1;
      if (month >= 1 && month <= 4) return (year - 1) + "-" + year;
      return year + "-" + (year + 1);
    }

    function getTermInfo(date = new Date()) {
      const monthDay = (date.getMonth() + 1) * 100 + date.getDate();
      const schoolYear = getSchoolYear(date);

      if (monthDay >= 601 && monthDay <= 909) {
        return { id: "term1", name: "Term 1", schoolYear };
      }

      if (monthDay >= 910 && monthDay <= 1215) {
        return { id: "term2", name: "Term 2", schoolYear };
      }

      if (monthDay >= 104 && monthDay <= 403) {
        return { id: "term3", name: "Term 3", schoolYear };
      }

      return { id: "outOfTerm", name: "Outside Term", schoolYear };
    }

    function getDefaultActivityName() {
      const term = getTermInfo();
      const todayText = new Intl.DateTimeFormat("en-PH", {
        year: "numeric",
        month: "short",
        day: "2-digit"
      }).format(new Date());

      return "Recitation - " + term.name + " - " + todayText;
    }

    function updateQuickPointButtons() {
      const selectedPoints = pointsInput.value;
      quickPointButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.points === selectedPoints);
      });
    }

    function unlockFeedback() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;
      if (!audioContext) audioContext = new AudioContext();
      if (audioContext.state === "suspended") audioContext.resume().catch(() => {});
    }

    function beep(frequency, duration, volume) {
      if (!audioContext || audioContext.state !== "running") return;
      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();
      oscillator.type = "sine";
      oscillator.frequency.value = frequency;
      gain.gain.value = volume;
      oscillator.connect(gain);
      gain.connect(audioContext.destination);
      oscillator.start();
      setTimeout(() => oscillator.stop(), duration);
    }

    function successFeedback() {
      unlockFeedback();
      beep(740, 80, 0.08);
      setTimeout(() => beep(980, 110, 0.07), 90);
      if ("vibrate" in navigator) navigator.vibrate([40, 20, 40]);
    }

    function errorFeedback() {
      unlockFeedback();
      beep(220, 150, 0.08);
      if ("vibrate" in navigator) navigator.vibrate([100, 40, 100]);
    }

    function addRecent(message) {
      recentRecords.unshift(message);
      if (recentRecords.length > 6) recentRecords.pop();
      recentPanel.style.display = "block";
      recentList.innerHTML = "";

      recentRecords.forEach((record) => {
        const item = document.createElement("div");
        item.className = "recent-item";
        item.textContent = record;
        recentList.appendChild(item);
      });
    }

    function cleanupLocks() {
      const now = Date.now();
      recentLocks.forEach((expiresAt, key) => {
        if (expiresAt <= now) recentLocks.delete(key);
      });
    }

    function buildLockKey(studentId, points) {
      return studentId.toUpperCase() + "::" + String(points);
    }


    function normalizeSection(value) {
      return String(value || "").trim();
    }

    function sortStudentsBySectionName(a, b) {
      const sectionCompare = normalizeSection(a.section).localeCompare(normalizeSection(b.section), undefined, { sensitivity: "base" });
      if (sectionCompare !== 0) return sectionCompare;
      return String(a.fullName || "").localeCompare(String(b.fullName || ""), undefined, { sensitivity: "base" });
    }

    function getVisibleBulkStudents() {
      const selectedSection = bulkSectionFilter.value;
      const searchText = bulkSearch.value.trim().toLowerCase();

      return bulkStudents.filter((student) => {
        const sectionOk = !selectedSection || student.section === selectedSection;
        if (!sectionOk) return false;
        if (!searchText) return true;

        const haystack = [student.id, student.fullName, student.section].join(" ").toLowerCase();
        return haystack.includes(searchText);
      });
    }

    function getSelectedBulkIds() {
      return Array.from(bulkStudentList.querySelectorAll("input[data-student-id]:checked")).map((input) => input.dataset.studentId);
    }

    function updateBulkCount() {
      const selectedCount = getSelectedBulkIds().length;
      bulkCount.textContent = selectedCount + " selected";
    }

    function renderBulkStudents() {
      const visibleStudents = getVisibleBulkStudents();
      bulkStudentList.innerHTML = "";
      bulkStatus.textContent = visibleStudents.length + " student" + (visibleStudents.length === 1 ? "" : "s") + " shown";

      if (!visibleStudents.length) {
        const empty = document.createElement("div");
        empty.className = "student-check";
        empty.textContent = "No students found for this filter.";
        bulkStudentList.appendChild(empty);
        updateBulkCount();
        return;
      }

      visibleStudents.forEach((student) => {
        const label = document.createElement("label");
        label.className = "student-check";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.dataset.studentId = student.id;
        checkbox.addEventListener("change", updateBulkCount);

        const text = document.createElement("div");
        const name = document.createElement("strong");
        name.textContent = student.fullName || student.id;
        const meta = document.createElement("span");
        meta.textContent = (student.section || "No section") + " • " + student.id;

        text.appendChild(name);
        text.appendChild(meta);
        label.appendChild(checkbox);
        label.appendChild(text);
        bulkStudentList.appendChild(label);
      });

      updateBulkCount();
    }

    function populateBulkSections() {
      const currentValue = bulkSectionFilter.value;
      const sections = Array.from(new Set(bulkStudents.map((student) => student.section).filter(Boolean))).sort((a, b) => a.localeCompare(b, undefined, { sensitivity: "base" }));

      bulkSectionFilter.innerHTML = "";
      const allOption = document.createElement("option");
      allOption.value = "";
      allOption.textContent = "All Sections";
      bulkSectionFilter.appendChild(allOption);

      sections.forEach((section) => {
        const option = document.createElement("option");
        option.value = section;
        option.textContent = section;
        bulkSectionFilter.appendChild(option);
      });

      if (sections.includes(currentValue)) {
        bulkSectionFilter.value = currentValue;
      }
    }

    async function loadBulkStudents(force = false) {
      if (bulkLoaded && !force) {
        populateBulkSections();
        renderBulkStudents();
        return;
      }

      bulkStatus.textContent = "Loading students...";
      bulkStudentList.innerHTML = "";

      const snapshot = await getDocs(collection(db, "students"));
      bulkStudents = snapshot.docs.map((studentDoc) => {
        const data = studentDoc.data() || {};
        return {
          id: studentDoc.id,
          fullName: data.fullName || "",
          section: data.section || "",
          gender: data.gender || data.sex || ""
        };
      }).sort(sortStudentsBySectionName);

      bulkLoaded = true;
      populateBulkSections();
      renderBulkStudents();
    }

    async function openBulkModal() {
      if (!auth.currentUser) {
        showResult("error", "Please sign in first before using Bulk Recitation.");
        return;
      }

      unlockFeedback();
      bulkPoints.value = pointsInput.value || "1";
      bulkModal.classList.add("open");

      try {
        await loadBulkStudents(false);
      } catch (error) {
        bulkStatus.textContent = "Failed to load students.";
        bulkStudentList.innerHTML = "";
        showResult("error", "Bulk student load failed:\n" + error.message);
      }
    }

    function closeBulkModal() {
      if (bulkBusy) return;
      bulkModal.classList.remove("open");
    }

    function selectVisibleBulkStudents() {
      bulkStudentList.querySelectorAll("input[data-student-id]").forEach((input) => {
        input.checked = true;
      });
      updateBulkCount();
    }

    function clearBulkSelection() {
      bulkStudentList.querySelectorAll("input[data-student-id]").forEach((input) => {
        input.checked = false;
      });
      updateBulkCount();
    }

    async function recordBulkRecitation() {
      if (bulkBusy) return;

      if (!auth.currentUser) {
        showResult("error", "Please sign in first before recording.");
        return;
      }

      const selectedIds = getSelectedBulkIds();
      const points = Number(bulkPoints.value);
      const term = getTermInfo();
      const termField = "termTotals." + term.id;
      const activity = getDefaultActivityName() + " - Bulk";

      if (!selectedIds.length) {
        bulkStatus.textContent = "Please select at least one student.";
        return;
      }

      if (!Number.isFinite(points) || points <= 0) {
        bulkStatus.textContent = "Invalid points.";
        return;
      }

      const confirmed = confirm("Record +" + points + " point" + (points === 1 ? "" : "s") + " to " + selectedIds.length + " student" + (selectedIds.length === 1 ? "" : "s") + "?");
      if (!confirmed) return;

      const studentMap = new Map(bulkStudents.map((student) => [student.id, student]));
      const selectedStudents = selectedIds.map((id) => studentMap.get(id)).filter(Boolean);

      bulkBusy = true;
      recordBulkButton.disabled = true;
      cancelBulkButton.disabled = true;
      closeBulkButton.disabled = true;
      bulkStatus.textContent = "Recording bulk recitation...";

      try {
        const chunkSize = 200;
        for (let start = 0; start < selectedStudents.length; start += chunkSize) {
          const chunk = selectedStudents.slice(start, start + chunkSize);
          const batch = writeBatch(db);

          chunk.forEach((student) => {
            const studentRef = doc(db, "students", student.id);
            const logRef = doc(collection(db, "recitationLogs"));

            batch.update(studentRef, {
              totalPoints: increment(points),
              [termField]: increment(points),
              latestAt: serverTimestamp(),
              latestPoints: points,
              latestTermId: term.id,
              latestTermName: term.name,
              updatedAt: serverTimestamp()
            });

            batch.set(logRef, {
              studentId: student.id,
              fullName: student.fullName || "",
              section: student.section || "",
              points,
              activity,
              termId: term.id,
              termName: term.name,
              schoolYear: term.schoolYear,
              bulk: true,
              createdAt: serverTimestamp()
            });
          });

          await batch.commit();
        }

        showResult("success", "Bulk recorded: +" + points + " to " + selectedStudents.length + " student" + (selectedStudents.length === 1 ? "" : "s") + ".\n" + term.name + " | Leaderboard updates live.");
        addRecent("Bulk Recitation: " + selectedStudents.length + " student" + (selectedStudents.length === 1 ? "" : "s") + " +" + points + "\n" + term.name);
        clearBulkSelection();
        closeBulkModal();
        successFeedback();
      } catch (error) {
        showResult("error", "Bulk save failed:\n" + error.message);
        bulkStatus.textContent = "Bulk save failed.";
        errorFeedback();
      } finally {
        bulkBusy = false;
        recordBulkButton.disabled = false;
        cancelBulkButton.disabled = false;
        closeBulkButton.disabled = false;
      }
    }

    async function recordStudent(studentIdValue) {
      unlockFeedback();
      cleanupLocks();

      if (!auth.currentUser) {
        showResult("error", "Please sign in first before recording.");
        errorFeedback();
        return;
      }

      const studentId = normalizeStudentId(studentIdValue);
      const points = Number(pointsInput.value);
      const activity = getDefaultActivityName();
      const term = getTermInfo();
      const termField = "termTotals." + term.id;

      if (!studentId) {
        showResult("error", "Please scan or type a Student ID.");
        errorFeedback();
        return;
      }

      if (!Number.isFinite(points) || points <= 0) {
        showResult("error", "Invalid points.");
        errorFeedback();
        return;
      }

      const lockKey = buildLockKey(studentId, points);
      if (recentLocks.has(lockKey)) {
        showResult("queued", "Duplicate scan ignored for " + studentId + ".\nMove to the next student.");
        return;
      }

      recentLocks.set(lockKey, Date.now() + SCAN_COOLDOWN_MS);
      showResult("loading", "Saving " + studentId + "...");

      try {
        const studentRef = doc(db, "students", studentId);
        const studentSnap = await getDoc(studentRef);

        if (!studentSnap.exists()) {
          recentLocks.delete(lockKey);
          showResult("error", "Student ID not found: " + studentId);
          errorFeedback();
          return;
        }

        const student = studentSnap.data() || {};
        const logRef = doc(collection(db, "recitationLogs"));

        await runTransaction(db, async (transaction) => {
          transaction.update(studentRef, {
            totalPoints: increment(points),
            [termField]: increment(points),
            latestAt: serverTimestamp(),
            latestPoints: points,
            latestTermId: term.id,
            latestTermName: term.name,
            updatedAt: serverTimestamp()
          });

          transaction.set(logRef, {
            studentId,
            fullName: student.fullName || "",
            section: student.section || "",
            points,
            activity,
            termId: term.id,
            termName: term.name,
            schoolYear: term.schoolYear,
            createdAt: serverTimestamp()
          });
        });

        const displayName = student.fullName || studentId;
        showResult("success", "Recorded: " + displayName + " +" + points + "\n" + term.name + " | Firebase leaderboard updates live.");
        addRecent(displayName + " +" + points + "\n" + (student.section || "") + " | " + term.name);
        successFeedback();
      } catch (error) {
        recentLocks.delete(lockKey);
        showResult("error", "Firebase save failed:\n" + error.message);
        errorFeedback();
      }
    }

    async function stopScannerIfNeeded() {
      if (!scannerStarted) return;

      try {
        await scanner.stop();
      } catch (error) {
        // Scanner may already be stopped.
      }

      scannerStarted = false;
      startButton.disabled = false;
    }

    async function signInTeacher() {
      const email = teacherEmail.value.trim();
      const password = teacherPassword.value;

      if (!email || !password) {
        showAuth("error", "Teacher email and password are required.");
        return;
      }

      signInButton.disabled = true;
      showAuth("loading", "Signing in...");

      try {
        await signInWithEmailAndPassword(auth, email, password);
        setHeartMenu(false);
        teacherPassword.value = "";
      } catch (error) {
        showAuth("error", "Sign in failed:\n" + error.message);
      } finally {
        signInButton.disabled = false;
      }
    }

    async function signOutTeacher() {
      await stopScannerIfNeeded();
      await signOut(auth);
    }

    function pauseScannerBriefly() {
      if (!scannerStarted || scanPauseActive) return;
      scanPauseActive = true;

      try {
        scanner.pause(true);
      } catch (error) {
        // Scanner may already be pausing.
      }

      setTimeout(() => {
        scanPauseActive = false;
        if (!scannerStarted) return;

        try {
          scanner.resume();
        } catch (error) {
          // Scanner may already be running.
        }
      }, SCANNER_PAUSE_MS);
    }

    async function startScanner() {
      if (scannerStarted) return;
      unlockFeedback();
      startButton.disabled = true;
      showResult("loading", "Starting camera...");

      try {
        await scanner.start(
          { facingMode: "environment" },
          { fps: 15, qrbox: { width: 220, height: 220 }, aspectRatio: 1, disableFlip: true },
          (decodedText) => {
            if (scanPauseActive) return;
            pauseScannerBriefly();
            recordStudent(decodedText);
          }
        );

        scannerStarted = true;
        showResult("success", "Camera scanner ready.");
      } catch (error) {
        startButton.disabled = false;
        showResult("error", "Camera Error:\n" + error.message);
      }
    }

    manualButton.addEventListener("click", () => {
      const studentId = manualStudentId.value;
      manualStudentId.value = "";
      recordStudent(studentId);
    });

    manualStudentId.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        const studentId = manualStudentId.value;
        manualStudentId.value = "";
        recordStudent(studentId);
      }
    });

    startButton.addEventListener("click", startScanner);
    bulkButton.addEventListener("click", openBulkModal);
    closeBulkButton.addEventListener("click", closeBulkModal);
    cancelBulkButton.addEventListener("click", closeBulkModal);
    bulkModal.addEventListener("click", (event) => {
      if (event.target === bulkModal) closeBulkModal();
    });
    bulkSectionFilter.addEventListener("change", renderBulkStudents);
    bulkSearch.addEventListener("input", renderBulkStudents);
    selectVisibleButton.addEventListener("click", selectVisibleBulkStudents);
    clearSelectedButton.addEventListener("click", clearBulkSelection);
    recordBulkButton.addEventListener("click", recordBulkRecitation);
    heartMenuButton.addEventListener("click", (event) => {
      event.stopPropagation();
      toggleHeartMenu();
    });

    heartMenu.addEventListener("click", (event) => {
      event.stopPropagation();
    });

    document.addEventListener("click", () => {
      setHeartMenu(false);
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") setHeartMenu(false);
    });

    signInButton.addEventListener("click", signInTeacher);
    signOutButton.addEventListener("click", signOutTeacher);
    teacherPassword.addEventListener("keydown", (event) => {
      if (event.key === "Enter") signInTeacher();
    });
    pointsInput.addEventListener("input", updateQuickPointButtons);
    quickPointButtons.forEach((button) => {
      button.addEventListener("click", () => {
        unlockFeedback();
        pointsInput.value = button.dataset.points;
        updateQuickPointButtons();
      });
    });

    onAuthStateChanged(auth, (user) => {
      const signedIn = Boolean(user);
      authPanel.classList.toggle("signed-in", signedIn);
      scannerPanel.hidden = !signedIn;
      signOutButton.hidden = !signedIn;
      signInButton.hidden = signedIn;
      teacherEmail.disabled = signedIn;
      teacherPassword.disabled = signedIn;

      if (signedIn) {
        showAuth("success", "Signed in: " + user.email);
      } else {
        closeBulkModal();
        bulkLoaded = false;
        bulkStudents = [];
        showAuth("queued", "Sign in required before scanning.");
      }
    });
  </script>
</body>
</html>
